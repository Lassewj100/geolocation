<!DOCTYPE html>
<html lang="nb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posisjon på kart</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            padding: 1rem;
            background: #f0f2f5;
            color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .kort {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 100%;
            padding: 1.5rem;
            text-align: center;
        }
        button {
            background: #2563eb;
            color: #fff;
            border: none;
            padding: 0.65rem 1.5rem;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            margin: 0.5rem;
        }
        button:disabled {
            background: #94a3b8;
            cursor: wait;
        }
        .info {
            font-size: 1rem;
            font-weight: 500;
            background: #f8fafc;
            padding: 0.8rem;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            margin: 1rem 0;
        }
        .feil {
            color: #b91c1c;
            background: #fff5f5;
            border-color: #fecaca;
        }
        #kart {
            height: 300px;
            width: 100%;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-top: 1rem;
            display: none;
        }
        .vibrasjons-notat {
            font-size: 0.8rem;
            color: #666;
            margin-top: 0.3rem;
        }
    </style>
</head>
<body>
    <div class="kort">
        <h2>Min posisjon</h2>
        <button id="knapp">Vis posisjon</button>
        <button id="vibrerKnapp">Vibrer</button>
        <div id="info" class="info" style="display: none;"></div>
        <div id="kart"></div>
        <div class="vibrasjons-notat" id="vibrasjonsStatus"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const knapp = document.getElementById('knapp');
        const vibrerKnapp = document.getElementById('vibrerKnapp');
        const info = document.getElementById('info');
        const kartBeholder = document.getElementById('kart');
        const vibrasjonsStatus = document.getElementById('vibrasjonsStatus');
        let kart = null;
        let marker = null;

        function vibrer(monster) {
            if (navigator.vibrate) {
                navigator.vibrate(monster);
            }
        }

        function vibrerTest() {
            if (navigator.vibrate) {
                // Lengre og tydeligere mønster: 300ms vibrasjon, pause, 300ms
                navigator.vibrate([300, 100, 300]);
                vibrasjonsStatus.textContent = '';
                // Vis kort bekreftelse i infoboksen
                info.style.display = 'block';
                info.classList.remove('feil');
                info.textContent = 'Telefonen vibrerer nå.';
                setTimeout(() => {
                    if (info.textContent === 'Telefonen vibrerer nå.') {
                        info.style.display = 'none';
                    }
                }, 1500);
            } else {
                // Vibrering støttes ikke – gi beskjed
                vibrasjonsStatus.textContent = 'Vibrering støttes ikke på denne enheten.';
                // Vis melding i infoboksen også
                info.style.display = 'block';
                info.classList.add('feil');
                info.textContent = 'Vibrering er ikke tilgjengelig på din enhet/nettleser (f.eks. iPhone støtter ikke dette).';
                // Fjern meldingen etter 3 sekunder
                setTimeout(() => {
                    if (info.textContent.includes('Vibrering er ikke tilgjengelig')) {
                        info.style.display = 'none';
                    }
                }, 3000);
            }
        }

        function opprettKart(lat, lng) {
            if (kart) {
                kart.remove();
                kart = null;
            }
            kartBeholder.style.display = 'block';
            kart = L.map('kart').setView([lat, lng], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
            }).addTo(kart);
            marker = L.marker([lat, lng]).addTo(kart)
                .bindPopup(`<b>Min posisjon</b><br>${lat.toFixed(6)}, ${lng.toFixed(6)}`)
                .openPopup();
            setTimeout(() => kart.invalidateSize(), 100);
        }

        function visPosisjon(posisjon) {
            const lat = posisjon.coords.latitude;
            const lng = posisjon.coords.longitude;
            const latRetning = lat >= 0 ? 'N' : 'S';
            const lngRetning = lng >= 0 ? 'E' : 'W';
            info.style.display = 'block';
            info.classList.remove('feil');
            info.innerHTML = 
                `Breddegrad: ${Math.abs(lat).toFixed(6)}° ${latRetning}<br>
                 Lengdegrad: ${Math.abs(lng).toFixed(6)}° ${lngRetning}`;
            opprettKart(lat, lng);
            vibrer(200);
        }

        function visFeil(melding) {
            info.style.display = 'block';
            info.classList.add('feil');
            info.textContent = melding;
            kartBeholder.style.display = 'none';
            if (kart) {
                kart.remove();
                kart = null;
            }
            vibrer([150, 80, 150]);
        }

        function hentPosisjon() {
            if (!navigator.geolocation) {
                visFeil('Geolokasjon støttes ikke av denne nettleseren.');
                return;
            }
            if (knapp.disabled) return;
            knapp.disabled = true;
            knapp.textContent = 'Henter...';
            navigator.geolocation.getCurrentPosition(
                pos => {
                    visPosisjon(pos);
                    knapp.disabled = false;
                    knapp.textContent = 'Vis posisjon';
                },
                feil => {
                    let melding = 'Kunne ikke hente posisjon.';
                    if (feil.code === 1) melding = 'Tilgang avslått. Sjekk innstillinger.';
                    else if (feil.code === 2) melding = 'Posisjon utilgjengelig.';
                    else if (feil.code === 3) melding = 'Tidsavbrudd.';
                    visFeil(melding);
                    knapp.disabled = false;
                    knapp.textContent = 'Vis posisjon';
                },
                { enableHighAccuracy: true }
            );
        }

        knapp.addEventListener('click', hentPosisjon);
        vibrerKnapp.addEventListener('click', vibrerTest);

        // Sjekk vibrasjonsstøtte ved oppstart og vis en liten notis
        if (!navigator.vibrate) {
            vibrasjonsStatus.textContent = 'Vibrering støttes ikke på denne enheten.';
        }
    </script>
</body>
</html>
