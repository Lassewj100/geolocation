<!DOCTYPE html>
<html lang="nb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posisjon på kart</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            padding: 1rem;
            background: #f0f2f5;
            color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .kort {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 100%;
            padding: 1.5rem;
            text-align: center;
        }
        button {
            background: #2563eb;
            color: #fff;
            border: none;
            padding: 0.65rem 1.5rem;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            margin: 1rem 0;
        }
        button:disabled {
            background: #94a3b8;
            cursor: wait;
        }
        .info {
            font-size: 1rem;
            font-weight: 500;
            background: #f8fafc;
            padding: 0.8rem;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            margin: 1rem 0;
        }
        .feil {
            color: #b91c1c;
            background: #fff5f5;
            border-color: #fecaca;
        }
        #kart {
            height: 300px;
            width: 100%;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-top: 1rem;
            display: none; /* vises når posisjon er klar */
        }
    </style>
</head>
<body>
    <div class="kort">
        <h2>Min posisjon</h2>
        <button id="knapp">Vis posisjon</button>
        <div id="info" class="info" style="display: none;"></div>
        <div id="kart"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const knapp = document.getElementById('knapp');
        const info = document.getElementById('info');
        const kartBeholder = document.getElementById('kart');
        let kart = null;
        let marker = null;

        function vibrer(monster) {
            if (navigator.vibrate) navigator.vibrate(monster);
        }

        function opprettKart(lat, lng) {
            // Fjern eksisterende kart hvis det allerede finnes
            if (kart) {
                kart.remove();
                kart = null;
            }

            // Vis kartbeholderen
            kartBeholder.style.display = 'block';

            // Opprett kart sentrert på posisjonen
            kart = L.map('kart').setView([lat, lng], 15);

            // Legg til OpenStreetMap-fliser
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
            }).addTo(kart);

            // Legg til markør
            marker = L.marker([lat, lng]).addTo(kart)
                .bindPopup(`<b>Min posisjon</b><br>${lat.toFixed(6)}, ${lng.toFixed(6)}`)
                .openPopup();

            // Tving kartet til å oppdatere størrelsen (løser renderingsproblemer)
            setTimeout(() => kart.invalidateSize(), 100);
        }

        function visPosisjon(posisjon) {
            const lat = posisjon.coords.latitude;
            const lng = posisjon.coords.longitude;
            const latRetning = lat >= 0 ? 'N' : 'S';
            const lngRetning = lng >= 0 ? 'E' : 'W';

            // Vis tekstinformasjon
            info.style.display = 'block';
            info.classList.remove('feil');
            info.innerHTML = 
                `Breddegrad: ${Math.abs(lat).toFixed(6)}° ${latRetning}<br>
                 Lengdegrad: ${Math.abs(lng).toFixed(6)}° ${lngRetning}`;

            // Opprett/oppdater kart
            opprettKart(lat, lng);

            vibrer(200);
        }

        function visFeil(melding) {
            info.style.display = 'block';
            info.classList.add('feil');
            info.textContent = melding;

            // Skjul kartet ved feil
            kartBeholder.style.display = 'none';
            if (kart) {
                kart.remove();
                kart = null;
            }

            vibrer([150, 80, 150]);
        }

        function hentPosisjon() {
            if (!navigator.geolocation) {
                visFeil('Geolokasjon støttes ikke av denne nettleseren.');
                return;
            }
            if (knapp.disabled) return;

            knapp.disabled = true;
            knapp.textContent = 'Henter...';

            navigator.geolocation.getCurrentPosition(
                pos => {
                    visPosisjon(pos);
                    knapp.disabled = false;
                    knapp.textContent = 'Vis posisjon';
                },
                feil => {
                    let melding = 'Kunne ikke hente posisjon.';
                    if (feil.code === 1) melding = 'Tilgang avslått. Sjekk innstillinger.';
                    else if (feil.code === 2) melding = 'Posisjon utilgjengelig.';
                    else if (feil.code === 3) melding = 'Tidsavbrudd.';
                    visFeil(melding);
                    knapp.disabled = false;
                    knapp.textContent = 'Vis posisjon';
                },
                { enableHighAccuracy: true }
            );
        }

        knapp.addEventListener('click', hentPosisjon);
    </script>
</body>
</html>
