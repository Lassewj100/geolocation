<!DOCTYPE html>
<html lang="nb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geolokasjon – Vis posisjon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f4f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
            color: #1e1e1e;
        }

        .card {
            background: #ffffff;
            border: 1px solid #d9d9d9;
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
            color: #1a1a1a;
        }

        .subtitle {
            font-size: 0.95rem;
            color: #5e5e5e;
            margin-bottom: 1.8rem;
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            background: #2563eb;
            color: #ffffff;
            border: none;
            padding: 0.75rem 1.8rem;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s ease, opacity 0.15s ease;
            letter-spacing: 0.01em;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        .btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            opacity: 0.8;
        }

        .result {
            margin-top: 1.8rem;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 1.2rem 1.4rem;
            background: #fafafa;
            display: none;
        }

        .result.visible {
            display: block;
        }

        .result.error {
            background: #fff5f5;
            border-color: #fecaca;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 0.5rem 0;
            border-bottom: 1px solid #eaeaea;
        }

        .row:last-of-type {
            border-bottom: none;
        }

        .label {
            font-size: 0.9rem;
            font-weight: 500;
            color: #4b5563;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #111827;
            font-variant-numeric: tabular-nums;
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
        }

        .accuracy {
            margin-top: 0.6rem;
            font-size: 0.85rem;
            color: #4b5563;
            font-weight: 500;
        }

        .map-link {
            display: inline-block;
            margin-top: 0.8rem;
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .map-link:hover {
            text-decoration: underline;
            color: #1d4ed8;
        }

        .error-msg {
            color: #b91c1c;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .note {
            font-size: 0.78rem;
            color: #9ca3af;
            margin-top: 1.5rem;
            line-height: 1.5;
        }

        hr {
            border: none;
            border-top: 1px solid #e5e7eb;
            margin: 1rem 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Min posisjon</h1>
        <p class="subtitle">
            Finn din geografiske plassering med lengdegrad og breddegrad.
        </p>

        <button class="btn" id="getPosBtn">Vis posisjon</button>

        <div class="result" id="resultBox" aria-live="polite">
            <div class="row">
                <span class="label">Breddegrad</span>
                <span class="value" id="latDisplay">—</span>
            </div>
            <div class="row">
                <span class="label">Lengdegrad</span>
                <span class="value" id="lngDisplay">—</span>
            </div>
            <div class="accuracy" id="accuracyInfo" style="display: none;"></div>
            <a class="map-link" id="mapLink" href="#" target="_blank" rel="noopener noreferrer" style="display: none;">
                Åpne i Google Maps
            </a>
            <div class="error-msg" id="errorMsg" style="display: none;"></div>
        </div>

        <hr>
        <p class="note">
            Nettleseren må ha tillatelse til posisjonstjenester. Sørg for at du bruker HTTPS eller localhost for best kompatibilitet.
        </p>
    </div>

    <script>
        (function() {
            const btn = document.getElementById('getPosBtn');
            const resultBox = document.getElementById('resultBox');
            const latDisplay = document.getElementById('latDisplay');
            const lngDisplay = document.getElementById('lngDisplay');
            const accuracyInfo = document.getElementById('accuracyInfo');
            const mapLink = document.getElementById('mapLink');
            const errorMsg = document.getElementById('errorMsg');

            let isLoading = false;

            function resetUI() {
                latDisplay.textContent = '—';
                lngDisplay.textContent = '—';
                accuracyInfo.style.display = 'none';
                accuracyInfo.textContent = '';
                mapLink.style.display = 'none';
                mapLink.href = '#';
                errorMsg.style.display = 'none';
                errorMsg.textContent = '';
                resultBox.classList.remove('error', 'visible');
            }

            function showError(message) {
                resetUI();
                errorMsg.textContent = message;
                errorMsg.style.display = 'block';
                resultBox.classList.add('error', 'visible');
            }

            function showPosition(position) {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                const accuracy = position.coords.accuracy;

                // Formater med retning (N/S, E/W) og 6 desimaler
                const latDir = lat >= 0 ? 'N' : 'S';
                const lngDir = lng >= 0 ? 'E' : 'W';
                const absLat = Math.abs(lat).toFixed(6);
                const absLng = Math.abs(lng).toFixed(6);

                latDisplay.textContent = `${absLat}° ${latDir}`;
                lngDisplay.textContent = `${absLng}° ${lngDir}`;

                if (accuracy != null) {
                    accuracyInfo.textContent = `Nøyaktighet: ± ${Math.round(accuracy)} meter`;
                    accuracyInfo.style.display = 'block';
                }

                // Google Maps-lenke
                const mapsUrl = `https://www.google.com/maps?q=${lat},${lng}`;
                mapLink.href = mapsUrl;
                mapLink.style.display = 'inline-block';

                resultBox.classList.remove('error');
                resultBox.classList.add('visible');
            }

            function handleError(error) {
                let message;
                switch (error.code) {
                    case error.PERMISSION_DENIED:
                        message = 'Tilgang til posisjon ble avslått. Sjekk innstillingene for posisjonstjenester.';
                        break;
                    case error.POSITION_UNAVAILABLE:
                        message = 'Posisjon utilgjengelig. Prøv igjen eller flytt til et område med bedre signal.';
                        break;
                    case error.TIMEOUT:
                        message = 'Tidsavbrudd. Kunne ikke hente posisjon innen rimelig tid.';
                        break;
                    default:
                        message = 'En ukjent feil oppstod ved henting av posisjon.';
                }
                showError(message);
            }

            function getPosition() {
                if (!navigator.geolocation) {
                    showError('Geolokasjon støttes ikke av denne nettleseren.');
                    return;
                }

                if (isLoading) return;
                isLoading = true;

                // Oppdater knapp – fjern tidligere resultater
                resetUI();
                btn.disabled = true;
                btn.textContent = 'Henter posisjon...';

                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        showPosition(pos);
                        btn.disabled = false;
                        btn.textContent = 'Vis posisjon';
                        isLoading = false;
                    },
                    (err) => {
                        handleError(err);
                        btn.disabled = false;
                        btn.textContent = 'Vis posisjon';
                        isLoading = false;
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 15000,
                        maximumAge: 0
                    }
                );
            }

            btn.addEventListener('click', getPosition);
        })();
    </script>
</body>
</html>
