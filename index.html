<!DOCTYPE html>
<html lang="nb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posisjon på kart</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            padding: 1rem;
            background: #f0f2f5;
            color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .kort {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 100%;
            padding: 1.5rem;
            text-align: center;
        }
        button {
            background: #2563eb;
            color: #fff;
            border: none;
            padding: 0.65rem 1.5rem;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            margin: 0.5rem;
            transition: background 0.15s, transform 0.1s ease;
        }
        button:disabled {
            background: #94a3b8;
            cursor: wait;
        }
        button:active {
            transform: scale(0.96);
        }
        .info {
            font-size: 1rem;
            font-weight: 500;
            background: #f8fafc;
            padding: 0.8rem;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            margin: 1rem 0;
            display: none;
            text-align: left;
        }
        .info.visible {
            display: block;
        }
        .feil {
            color: #b91c1c;
            background: #fff5f5;
            border-color: #fecaca;
        }
        #kart {
            height: 300px;
            width: 100%;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-top: 1rem;
            display: none;
        }
        .ekstra-knapper {
            display: none;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .ekstra-knapper.visible {
            display: flex;
        }
        /* Puls-animasjon */
        @keyframes puls {
            0% { transform: scale(1); }
            50% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }
        .puls {
            animation: puls 0.2s ease;
        }
    </style>
</head>
<body>
    <div class="kort">
        <h2>Min posisjon</h2>
        <button id="knapp">Vis posisjon</button>
        <button id="lydKnapp">Test lyd</button>
        <div id="info" class="info"></div>
        <div id="kart"></div>
        <div class="ekstra-knapper" id="ekstraKnapper">
            <button id="delKnapp">Del posisjon</button>
            <button id="kopierKnapp">Kopier koordinater</button>
            <button id="mapsKnapp">Google Maps</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // DOM-elementer
        const knapp = document.getElementById('knapp');
        const lydKnapp = document.getElementById('lydKnapp');
        const info = document.getElementById('info');
        const kartBeholder = document.getElementById('kart');
        const ekstraKnapper = document.getElementById('ekstraKnapper');
        const delKnapp = document.getElementById('delKnapp');
        const kopierKnapp = document.getElementById('kopierKnapp');
        const mapsKnapp = document.getElementById('mapsKnapp');

        let kart = null;
        let marker = null;
        let sistePosisjon = null; // { lat, lng, latRetning, lngRetning }

        // Lyd med AudioContext (fungerer på iPhone)
        let audioCtx = null;
        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            // Lås opp lyd etter brukerinteraksjon
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            return audioCtx;
        }

        function spillPip(frekvens = 800, varighet = 100, type = 'sine') {
            try {
                const ctx = getAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(frekvens, ctx.currentTime);
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + varighet / 1000);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + varighet / 1000);
            } catch (e) {
                // Lyd ikke tilgjengelig, ignorer
            }
        }

        function lydSuksess() {
            spillPip(800, 120, 'sine');
        }

        function lydFeil() {
            spillPip(400, 100, 'square');
            setTimeout(() => spillPip(400, 100, 'square'), 150);
        }

        // Visuell puls
        function pulser(element) {
            element.classList.add('puls');
            setTimeout(() => element.classList.remove('puls'), 200);
        }

        // Kartfunksjoner
        function opprettKart(lat, lng) {
            if (kart) {
                kart.remove();
                kart = null;
            }
            kartBeholder.style.display = 'block';
            kart = L.map('kart').setView([lat, lng], 16);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(kart);
            marker = L.marker([lat, lng]).addTo(kart)
                .bindPopup('Min posisjon')
                .openPopup();
            setTimeout(() => kart.invalidateSize(), 100);
        }

        function visPosisjon(posisjon) {
            const lat = posisjon.coords.latitude;
            const lng = posisjon.coords.longitude;
            const latRetning = lat >= 0 ? 'N' : 'S';
            const lngRetning = lng >= 0 ? 'E' : 'W';

            sistePosisjon = { lat, lng, latRetning, lngRetning };

            // Vis info-boks
            info.classList.remove('feil');
            info.classList.add('visible');
            info.innerHTML = `
                <div><strong>Breddegrad:</strong> ${Math.abs(lat).toFixed(6)}° ${latRetning}</div>
                <div><strong>Lengdegrad:</strong> ${Math.abs(lng).toFixed(6)}° ${lngRetning}</div>
            `;

            // Vis kart
            opprettKart(lat, lng);

            // Vis ekstra knapper
            ekstraKnapper.classList.add('visible');

            // Tilbakemelding
            lydSuksess();
            pulser(knapp);
        }

        function visFeil(melding) {
            info.classList.add('visible', 'feil');
            info.textContent = melding;
            kartBeholder.style.display = 'none';
            if (kart) {
                kart.remove();
                kart = null;
            }
            ekstraKnapper.classList.remove('visible');
            sistePosisjon = null;

            lydFeil();
            pulser(knapp);
        }

        function hentPosisjon() {
            if (!navigator.geolocation) {
                visFeil('Geolokasjon støttes ikke av denne nettleseren.');
                return;
            }
            if (knapp.disabled) return;

            knapp.disabled = true;
            knapp.textContent = 'Henter...';
            info.classList.remove('visible', 'feil');
            ekstraKnapper.classList.remove('visible');

            navigator.geolocation.getCurrentPosition(
                pos => {
                    visPosisjon(pos);
                    knapp.disabled = false;
                    knapp.textContent = 'Vis posisjon';
                },
                feil => {
                    let melding = 'Kunne ikke hente posisjon.';
                    if (feil.code === 1) melding = 'Tilgang avslått. Sjekk innstillinger.';
                    else if (feil.code === 2) melding = 'Posisjon utilgjengelig.';
                    else if (feil.code === 3) melding = 'Tidsavbrudd.';
                    visFeil(melding);
                    knapp.disabled = false;
                    knapp.textContent = 'Vis posisjon';
                },
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
            );
        }

        // Test lyd-knapp
        lydKnapp.addEventListener('click', () => {
            spillPip(600, 100, 'triangle');
            pulser(lydKnapp);
        });

        // Del posisjon (Web Share API – iPhone)
        delKnapp.addEventListener('click', () => {
            if (!sistePosisjon) return;
            const { lat, lng, latRetning, lngRetning } = sistePosisjon;
            const tekst = `Min posisjon: ${Math.abs(lat).toFixed(6)}° ${latRetning}, ${Math.abs(lng).toFixed(6)}° ${lngRetning}`;
            const url = `https://www.google.com/maps?q=${lat},${lng}`;

            if (navigator.share) {
                navigator.share({
                    title: 'Min posisjon',
                    text: tekst,
                    url: url
                }).catch(() => {});
            } else {
                // Fallback – kopier
                navigator.clipboard.writeText(tekst + '\n' + url).then(() => {
                    alert('Koordinater og lenke kopiert til utklippstavlen.');
                }).catch(() => {
                    alert('Deling ikke støttet.\n' + tekst + '\n' + url);
                });
            }
            pulser(delKnapp);
            spillPip(700, 80, 'sine');
        });

        // Kopier koordinater
        kopierKnapp.addEventListener('click', () => {
            if (!sistePosisjon) return;
            const { lat, lng, latRetning, lngRetning } = sistePosisjon;
            const koordTekst = `${Math.abs(lat).toFixed(6)}° ${latRetning}, ${Math.abs(lng).toFixed(6)}° ${lngRetning}`;
            navigator.clipboard.writeText(koordTekst).then(() => {
                info.classList.remove('feil');
                info.classList.add('visible');
                info.innerHTML = 'Koordinater kopiert til utklippstavlen.';
                setTimeout(() => {
                    if (info.textContent === 'Koordinater kopiert til utklippstavlen.') {
                        info.classList.remove('visible');
                    }
                }, 2000);
            }).catch(() => {
                alert('Kunne ikke kopiere. Prøv igjen.');
            });
            pulser(kopierKnapp);
            spillPip(700, 80, 'sine');
        });

        // Åpne Google Maps
        mapsKnapp.addEventListener('click', () => {
            if (!sistePosisjon) return;
            const { lat, lng } = sistePosisjon;
            window.open(`https://www.google.com/maps?q=${lat},${lng}`, '_blank');
            pulser(mapsKnapp);
            spillPip(700, 80, 'sine');
        });

        // Hovedposisjonsknapp
        knapp.addEventListener('click', hentPosisjon);
    </script>
</body>
</html>
