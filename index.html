<!DOCTYPE html>
<html lang="nb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posisjon</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f0f2f5;
            color: #1a1a1a;
        }
        .kort {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            max-width: 380px;
            width: 100%;
        }
        button {
            background: #2563eb;
            color: #fff;
            border: none;
            padding: 0.65rem 1.5rem;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            margin: 1.5rem 0;
        }
        button:disabled {
            background: #94a3b8;
            cursor: wait;
        }
        .koordinater {
            font-size: 1.05rem;
            font-weight: 500;
            background: #f8fafc;
            padding: 0.9rem;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            margin-top: 1rem;
            word-break: break-word;
        }
        .feil {
            color: #b91c1c;
        }
    </style>
</head>
<body>
    <div class="kort">
        <h2>Min posisjon</h2>
        <button id="knapp">Vis posisjon</button>
        <div id="resultat" class="koordinater" style="display: none;"></div>
    </div>

    <script>
        const knapp = document.getElementById('knapp');
        const resultat = document.getElementById('resultat');

        function vibrer(monster) {
            if (navigator.vibrate) navigator.vibrate(monster);
        }

        function visPosisjon(posisjon) {
            const lat = posisjon.coords.latitude;
            const lng = posisjon.coords.longitude;
            const latRetning = lat >= 0 ? 'N' : 'S';
            const lngRetning = lng >= 0 ? 'E' : 'W';

            resultat.style.display = 'block';
            resultat.classList.remove('feil');
            resultat.innerHTML = 
                `Breddegrad: ${Math.abs(lat).toFixed(6)}° ${latRetning}<br>
                 Lengdegrad: ${Math.abs(lng).toFixed(6)}° ${lngRetning}`;
            vibrer(200);
        }

        function visFeil(melding) {
            resultat.style.display = 'block';
            resultat.classList.add('feil');
            resultat.textContent = melding;
            vibrer([150, 80, 150]);
        }

        function hentPosisjon() {
            if (!navigator.geolocation) {
                visFeil('Geolokasjon støttes ikke av denne nettleseren.');
                return;
            }
            if (knapp.disabled) return;

            knapp.disabled = true;
            knapp.textContent = 'Henter...';

            navigator.geolocation.getCurrentPosition(
                pos => {
                    visPosisjon(pos);
                    knapp.disabled = false;
                    knapp.textContent = 'Vis posisjon';
                },
                feil => {
                    let melding = 'Kunne ikke hente posisjon.';
                    if (feil.code === 1) melding = 'Tilgang avslått. Sjekk innstillinger.';
                    else if (feil.code === 2) melding = 'Posisjon utilgjengelig.';
                    else if (feil.code === 3) melding = 'Tidsavbrudd.';
                    visFeil(melding);
                    knapp.disabled = false;
                    knapp.textContent = 'Vis posisjon';
                },
                { enableHighAccuracy: true }
            );
        }

        knapp.addEventListener('click', hentPosisjon);
    </script>
</body>
</html>
